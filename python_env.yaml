python: "3.12"

build_dependencies:
  - pip
  - setuptools
  - wheel>=0.40.0

dependencies:
  # Core ML/DL
  - mlflow>=2.9.0
  - torch>=2.0.0
  - torchvision>=0.15.0
  - ultralytics>=8.0.0
  
  # Data processing
  - numpy>=1.24.0
  - opencv-python>=4.8.0
  - pillow>=10.0.0
  
  # API & Web
  - fastapi>=0.104.0
  - uvicorn>=0.24.0
  - streamlit>=1.28.0
  - python-multipart>=0.0.6
  
  # MLOps Tools
  - dvc>=3.30.0
  - dvc-gdrive>=3.0.0
  
  # Utilities
  - pyyaml>=6.0
  - pandas>=2.0.0
  - matplotlib>=3.7.0
  - seaborn>=0.12.0
  
  # ONNX Support
  - onnx>=1.15.0
  - onnxruntime-gpu>=1.16.0; sys_platform == 'linux' or sys_platform == 'win32'
  - onnxruntime>=1.16.0; sys_platform == 'darwin'
