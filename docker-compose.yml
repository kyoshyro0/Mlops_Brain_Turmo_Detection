version: '3.8'

services:
  backend:
    build:
      context: .
      target: backend
    container_name: brain-tumor-detection-api
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./mlruns:/app/mlruns
      - ./deployed_models:/app/deployed_models
    restart: unless-stopped
    environment:
      - PYTHONPATH=/app
      - MLFLOW_TRACKING_URI=sqlite:////app/mlruns/mlflow.db
      - CUDA_VISIBLE_DEVICES=0
    # GPU support - requires nvidia-docker2
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  frontend:
    build:
      context: .
      target: frontend
    container_name: brain-tumor-detection-ui
    ports:
      - "8501:8501"
    depends_on:
      - backend
    restart: unless-stopped
    environment:
      - API_URL=http://backend:8000
